<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password • Hoblemercy Tech</title>
 <style>
   :root {
  --glass: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.2);
  --accent: #a855f7;
  --accent-dark: #9333ea;
  --text: #fff;
  --text-muted: rgba(255,255,255,0.7);
}

* {
  box-sizing: border-box; /* ensures padding/border don’t break layout */
}

    body {
      margin: 0;
      font-family: 'Cabinet Grotesk', system-ui, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 20px;
     
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 15% 20%, rgba(168,85,247,0.25), transparent 40%),
        radial-gradient(circle at 85% 70%, rgba(96,165,250,0.2), transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(139,92,246,0.08), transparent 60%),
        #000;
      z-index: -2;
      pointer-events: none;
    }

    .stars {
      position: fixed;
      inset: 0;
      background: transparent;
      z-index: -1;
      pointer-events: none;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0.7;
      animation: twinkle 4s infinite alternate;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    h1 {
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      font-weight: 800;
      text-align: center;
      letter-spacing: -1px;
      line-height: 1.05;
      margin-bottom: 8px;
      text-shadow: 0 0 30px rgba(168,85,247,0.5);
    }

.reset-password-container {
  max-width: 400px; /* slightly smaller to fit better on mobile */
  width: 90%;       /* responsive on smaller screens */
  margin: 0 auto;
  padding: 28px;
  border-radius: 12px;
  background: var(--glass);
  display: flex;
  flex-direction: column;
  gap: 16px;
}

h2 { margin-bottom: 4px; }
p { margin-top: 0; color: var(--text-muted); }

.form-group { 
  position: relative; 
  width: 100%;
}

.form-group input {
  width: 100%;
  padding: 12px 40px 12px 12px; /* right padding for eye toggle */
  border-radius: 8px;
  border: 1px solid var(--glass-border);
  font-size: 16px;
  background: #1e1e1e;
  color: var(--text);
}

.toggle-eye {
  position: absolute;
  right: 12px; /* small spacing from edge */
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  user-select: none;
  font-size: 16px;
}

.password-criteria ul { 
  padding-left: 20px; 
  margin: 8px 0; 
}

.password-criteria li.invalid { color: red; }
.password-criteria li.valid { color: limegreen; }

.password-strength { font-weight: bold; font-size: 14px; }

button#resetBtn {
  padding: 14px;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  width: 100%; /* full width button */
}

button#resetBtn.loading {
  background: #555;
  cursor: not-allowed;
}

.success-message {
  text-align: center;
  color: limegreen;
  font-weight: bold;
  animation: fadeIn 0.3s;
}

@keyframes fadeIn { from {opacity:0} to {opacity:1} }
 </style>
</head>
<body>

<div class="reset-password-container">
  <h2>Reset Your Password</h2>
  <p>Choose a strong password to secure your account</p>
  
  <div class="form-group">
    <input type="password" id="newPassword" placeholder="New Password" />
    <span class="toggle-eye" id="toggleNew"></span>
  </div>
  
  <div class="form-group">
    <input type="password" id="confirmPassword" placeholder="Confirm Password" />
    <span class="toggle-eye" id="toggleConfirm"></span>
  </div>
  
  <div class="password-criteria">
    <p>Password must contain:</p>
    <ul>
      <li id="length" class="invalid">At least 8 characters</li>
      <li id="uppercase" class="invalid">An uppercase letter (A-Z)</li>
      <li id="number" class="invalid">A number (0-9)</li>
      <li id="symbol" class="invalid">A special character (!@#$%^&* etc.)</li>
    </ul>
  </div>
  
  <div class="password-strength" id="passwordStrength">Strength: Weak</div>
  
  <button id="resetBtn" disabled>Reset Password</button>
  
  <div class="success-message" id="successMessage" style="display:none;">
    ✅ Password reset successfully! Redirecting...
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  
  const supabaseUrl = 'https://jffkatwagcfshvddnipr.supabase.co'
  const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmZmthdHdhZ2Nmc2h2ZGRuaXByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMjc2MzUsImV4cCI6MjA4ODgwMzYzNX0.MnOvMKZ49gafMEToQeHYtmoH3qZVEJU3Yg8x3mykeQ8'
  
  const supabase = createClient(supabaseUrl, supabaseAnonKey)
  
  // Extract recovery tokens
  const urlParams = new URLSearchParams(window.location.search)
  const accessToken = urlParams.get('access_token')
  const refreshToken = urlParams.get('refresh_token')
  const type = urlParams.get('type')
  
  // Validate the reset link
  if (!accessToken || type !== 'recovery') {
    alert("Invalid or expired password reset link.\n\nPlease request a new one.")
    setTimeout(() => window.location.href = "auth.html", 2500)
    throw new Error("Invalid recovery link")
  }
  
  // Password visibility toggle
  function setupToggle(inputId, toggleId) {
    const input = document.getElementById(inputId)
    const toggle = document.getElementById(toggleId)
    
    const eye = `
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>`
    
    const eyeOff = `
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17.94 17.94A10.94 10.94 0 0112 19C5 19 1 12 1 12 a21.86 21.86 0 015.06-6.94"/>
        <path d="M1 1l22 22"/>
      </svg>`
    
    toggle.innerHTML = eye
    
    toggle.addEventListener('click', () => {
      const isPassword = input.type === 'password'
      input.type = isPassword ? 'text' : 'password'
      toggle.innerHTML = isPassword ? eyeOff : eye
    })
  }
  
  setupToggle('newPassword', 'toggleNew')
  setupToggle('confirmPassword', 'toggleConfirm')
  
  // Password criteria
  const criteria = {
    length: document.getElementById('length'),
    uppercase: document.getElementById('uppercase'),
    number: document.getElementById('number'),
    symbol: document.getElementById('symbol')
  }
  
  const strengthEl = document.getElementById('passwordStrength')
  const newInput = document.getElementById('newPassword')
  const resetBtn = document.getElementById('resetBtn')
  
  // Real-time password strength + enable button only when Very Strong
  newInput.addEventListener('input', () => {
    const val = newInput.value
    
    criteria.length.className = val.length >= 8 ? "valid" : "invalid"
    criteria.uppercase.className = /[A-Z]/.test(val) ? "valid" : "invalid"
    criteria.number.className = /\d/.test(val) ? "valid" : "invalid"
    criteria.symbol.className = /[^A-Za-z0-9]/.test(val) ? "valid" : "invalid"
    
    const passed = Object.values(criteria).filter(c => c.className === 'valid').length
    
    if (passed === 4) {
      strengthEl.textContent = "Strength: Very Strong"
      strengthEl.style.color = "limegreen"
    } else if (passed >= 3) {
      strengthEl.textContent = "Strength: Strong"
      strengthEl.style.color = "#ff9800"
    } else if (passed >= 2) {
      strengthEl.textContent = "Strength: Medium"
      strengthEl.style.color = "#ff9800"
    } else {
      strengthEl.textContent = "Strength: Weak"
      strengthEl.style.color = "red"
    }
    
    // Enable button only when password is Very Strong
    resetBtn.disabled = passed < 4
  })
  
  // Handle password reset
  resetBtn.addEventListener('click', async () => {
    const newPwd = newInput.value.trim()
    const confirmPwd = document.getElementById('confirmPassword').value.trim()
    const successMessage = document.getElementById('successMessage')
    
    if (!newPwd || !confirmPwd) {
      alert("Please fill in all fields")
      return
    }
    if (newPwd !== confirmPwd) {
      alert("Passwords do not match")
      return
    }
    
    resetBtn.classList.add('loading')
    resetBtn.textContent = "Resetting..."
    resetBtn.disabled = true
    
    try {
      // Set recovery session
      const { error: sessionError } = await supabase.auth.setSession({
        access_token: accessToken,
        refresh_token: refreshToken || ''
      })
      
      if (sessionError) throw new Error(`Session error: ${sessionError.message}`)
      
      // Update password
      const { data, error } = await supabase.auth.updateUser({
        password: newPwd
      })
      
      if (error) throw error
      
      // Optional: Save notification
      if (data?.user?.id) {
        supabase.from("notifications").insert({
          user_id: data.user.id,
          title: "Password Reset Successful",
          message: "Your account password was reset successfully.",
          type: "security"
        }).catch(() => {})
      }
      
      successMessage.style.display = "block"
      resetBtn.style.display = "none"
      
      setTimeout(() => {
        window.location.href = "auth.html"
      }, 2000)
      
    } catch (err) {
      console.error("Password reset error:", err)
      alert(err.message || "Failed to reset password. The link may have expired.")
    } finally {
      resetBtn.classList.remove('loading')
      resetBtn.textContent = "Reset Password"
      resetBtn.disabled = false
    }
  })
</script>
</body>
</html>
